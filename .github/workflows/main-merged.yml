# This triggers on all merged PRs into main

name: Main - Deploy

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  pull-requests: write
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
  
jobs:
  dev:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true) }}
    name: "[DEV]"
    uses: faccomichele/utils-n-scripts/.github/workflows/terraform-run.yml@main
    with:
      environment: 'dev'
      region: 'eu-central-1'
      working-directory: './terraform'
      action: 'apply'
    secrets: inherit

  docker-build-dev:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true) }}
    needs: dev
    name: "[DEV-DOCKER-BUILD]"
    uses: faccomichele/utils-n-scripts/.github/workflows/ecr-docker-build.yml@main
    with:
      environment: 'dev'
      region: 'eu-central-1'
      working-directory: './docker'
    secrets: inherit